name: crypto-api-fixer
version: 1.0.0
description: >
  Auto-repair middleware for crypto trading bots.
  Automatically detects and fixes 10 types of exchange API errors
  (rate limits, stale data, broken JSON, auth failures, price mismatches,
  endpoint downtime, financial risks, WebSocket failures, and more)
  in under 2ms — before your bot loses money.
  94.9% of fixes require zero AI calls. Learns from every fix.
  Free tier: 100 requests/bot. Paid via x402 USDC on Base.

author: your-github-username
license: MIT
homepage: https://github.com/yourusername/crypto-api-fixer

server:
  type: http
  url: https://YOUR_DEPLOYED_URL_HERE
  health: /health
  local_dev: http://localhost:8080

tools:

  - name: fix_stale_data
    description: >
      Detects stale or outdated API responses from crypto exchanges.
      Checks timestamp validity, fetches fresh data from backup sources.
      Use when: bot receives price data older than 5 seconds,
      or when timestamp is missing/malformed.
      Example: {status:200, data:{price:45000, timestamp:1700000000}} ->
      {action:'replaced_stale_with_fresh', fixed:true, latency_ms:1.2}
    endpoint: /fix
    method: POST
    input:
      status: integer (HTTP status code)
      data: object (raw API response data)

  - name: fix_rate_limit
    description: >
      Handles 429 and 503 rate limit errors from crypto exchanges.
      Respects retry-after headers, applies exponential backoff,
      rotates proxies on IP bans, resets weight on Binance limits.
      Use when: exchange returns 429 Too Many Requests or 503 Overloaded.
      Example: {status:429, headers:{retry-after:30}} ->
      {action:'wait_retry_after', wait_seconds:30, fixed:true}
    endpoint: /fix
    method: POST
    input:
      status: integer
      headers: object (response headers including retry-after)

  - name: fix_endpoint_down
    description: >
      Auto-failover when exchange API endpoint is down (502/503/504/DNS failure).
      Routes to backup mirrors: 4 Binance mirrors, Coinbase, Kraken, Bybit, OKX backups.
      Use when: connection refused, DNS failed, or gateway errors.
      Example: {status:503} ->
      {action:'switched_to_backup', backup_endpoint:'https://api1.binance.com', fixed:true}
    endpoint: /fix
    method: POST
    input:
      status: integer
      data: object

  - name: fix_unexpected_error
    description: >
      Handles unexpected 500 errors, null values, and wrong types in API responses.
      Removes null fields, fixes type coercion (string to float), triggers smart retry.
      Use when: response has null price, wrong data types, or internal server error.
      Example: {status:200, data:{price:null}} ->
      {action:'removed_null_values', fixed:true}
    endpoint: /fix
    method: POST
    input:
      status: integer
      data: object

  - name: fix_price_mismatch
    description: >
      Cross-exchange price validation to prevent trading on wrong prices.
      Detects outliers (>3% deviation), computes smart median across exchanges.
      Use when: prices differ significantly between exchanges or bot detects spread > 1%.
      Example: {prices:{binance:45000, bybit:50000}} ->
      {action:'excluded_outlier', validated_price:45000, fixed:true}
    endpoint: /fix
    method: POST
    input:
      status: integer
      data: object (with prices dict)

  - name: fix_json_broken
    description: >
      Repairs malformed JSON, schema changes, and missing required fields.
      Auto-remaps known exchange schemas (Binance, Coinbase, Kraken).
      Use when: JSON parse fails, schema changed without notice, or required fields missing.
      Example: {data:{ticker:{last_price:45000}}} ->
      {action:'remapped_schema', data:{price:45000}, fixed:true}
    endpoint: /fix
    method: POST
    input:
      status: integer
      data: object
      raw: string (raw unparsed response if available)

  - name: fix_auth_error
    description: >
      Fixes 401/403 authentication errors from crypto exchanges.
      Rotates API keys, recalculates HMAC signatures, syncs timestamps,
      switches proxies for IP bans. Falls back to degraded read-only mode.
      Use when: invalid signature, expired key, timestamp out of sync, or IP not whitelisted.
      Example: {status:401, data:{msg:'Signature invalid'}} ->
      {action:'recalculate_signature', fixed:true, confidence:0.95}
    endpoint: /fix
    method: POST
    input:
      status: integer
      data: object (exchange error response)

  - name: fix_financial_risk
    description: >
      Real-time financial risk detection and circuit breaker.
      Triggers on: price spikes > 3%, order book depth too low, API latency > 500ms.
      Pauses trading immediately to prevent losses. Returns trading_allowed=false.
      Use when: market is volatile or API is slow/unreliable.
      Example: {data:{change_pct:15}} ->
      {action:'circuit_breaker_triggered', trading_allowed:false, resume_after:60}
    endpoint: /fix
    method: POST
    input:
      status: integer
      data: object (with change_pct, latency_ms, order_book_depth)

  - name: fix_websocket_dead
    description: >
      Detects and fixes silent WebSocket disconnections.
      Monitors: heartbeat gaps, stale streams, silent disconnects.
      Triggers reconnect with backoff, resubscribes to channels automatically.
      Use when: WebSocket appears connected but no data received for > 30 seconds.
      Example: {data:{connected:true, last_message_ago_seconds:120}} ->
      {action:'force_reconnect', fixed:true, strategy:'immediate_reconnect'}
    endpoint: /fix
    method: POST
    input:
      status: integer
      data: object (with connected, last_message_ago_seconds)

  - name: fix_key_permission
    description: >
      Validates API key permissions and alerts on security risks.
      Detects missing TRADE permission, dangerous WITHDRAW permission enabled.
      Falls back to read-only degraded mode if trading key unavailable.
      Use when: bot gets 403 on trade endpoints or key setup is uncertain.
      Example: {status:403, data:{msg:'withdrawal enabled'}} ->
      {action:'alert_disable_withdrawal', trading_allowed:false, severity:'critical'}
    endpoint: /fix
    method: POST
    input:
      status: integer
      data: object (exchange permission error)

pricing:
  model: per_request
  currency: USDC
  network: base
  contract: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"
  tiers:
    - name: free
      requests: 100
      price: 0
      description: First 100 requests per bot — no payment needed
    - name: simple
      price: 0.003
      description: Cached or rule-based fix (94.9% of requests)
    - name: complex
      price: 0.007
      description: Agents loop with multi-agent reasoning

tags:
  - crypto
  - trading
  - trading-bot
  - api-repair
  - middleware
  - defi
  - bot
  - binance
  - coinbase
  - rate-limit
  - error-handling
  - circuit-breaker
  - x402
  - mcp

discovery:
  mcp: /mcp
  agent_card: /.well-known/agent-card.json
  openapi: /openapi.json

stats:
  fix_accuracy: "100% (10/10)"
  avg_latency: "<2ms"
  claude_api_usage: "<5% of requests"
  supported_exchanges: 5
  error_types_handled: 10
